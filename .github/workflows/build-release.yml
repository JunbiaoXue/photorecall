name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build Release APK
      run: gradle assembleRelease --no-daemon
    
    - name: Get version info
      id: version
      run: |
        VERSION=$(cat app/build.gradle.kts | grep "versionName" | sed 's/.*versionName.*=.*"\([^"]*\)".*/\1/' || echo "1.0.0")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}
        name: Release v${{ steps.version.outputs.version }}
        body: |
          ## 相册回忆录 / PhotoRecall v${{ steps.version.outputs.version }}
          
          ### 功能 / Features
          - 📸 随机展示相册图片 / Random photo display
          - 🗑️ 滑动决策：左滑删除，右滑保留 / Swipe to decide: left to delete, right to keep
          - 🔍 大图查看 / Full screen photo view
          - 📅 时光穿越：查看X年前的今天 / Time travel: view photos from X years ago
          - 📍 显示照片时间和定位 / Show photo date and location
          
          ### 安装方法 / Installation
          1. 下载APK文件 / Download the APK file
          2. 开启"允许安装未知来源应用" / Enable "Install from unknown sources"
          3. 点击APK安装 / Tap the APK to install
          
          ### 权限说明 / Permissions
          - 相册访问权限（读取和显示照片）
          - Photo gallery access (to read and display photos)
        files: |
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: photorecall-release-apk
        path: app/build/outputs/apk/release/app-release.apk
