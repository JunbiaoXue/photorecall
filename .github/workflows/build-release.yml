name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'
    
    - name: Build Release APK
      run: gradle assembleRelease --no-daemon
    
    - name: List build outputs
      run: find app/build/outputs -name "*.apk" -type f
      continue-on-error: true
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: photorecall-apk
        path: app/build/outputs/apk/release/
        retention-days: 5
    
    - name: Get version info
      id: version
      run: |
        VERSION=$(cat app/build.gradle.kts | grep "versionName" | sed 's/.*versionName.*=.*"\([^"]*\)".*/\1/' || echo "1.0.0")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
    
    - name: Download APK
      uses: actions/download-artifact@v4
      if: success()
      with:
        name: photorecall-apk
        path: ./apk/
    
    - name: List downloaded files
      run: ls -la ./apk/ && find ./apk/ -name "*.apk"
      if: success()
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date }}
        name: Release v${{ steps.version.outputs.version }}
        body: |
          ## 相册回忆录 / PhotoRecall v${{ steps.version.outputs.version }}
          
          ### 功能 / Features
          - 📸 随机展示相册图片 / Random photo display
          - 🗑️ 滑动决策：左滑删除，右滑保留 / Swipe to decide
          - 🔍 大图查看 / Full screen photo view
          - 📅 时光穿越：查看X年前的今天 / Time travel
          - 📍 显示照片时间和定位 / Show photo date and location
          
          ### 安装方法 / Installation
          1. 下载下方APK文件 / Download the APK file below
          2. 开启"允许安装未知来源应用" / Enable "Install from unknown sources"  
          3. 点击APK安装 / Tap the APK to install
        files: ./apk/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
